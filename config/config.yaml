crawler_sources:
  github:
    enabled: true
    base_url: https://api.github.com
    camouflage:
      enabled: true
      threshold: 4
      max_items: 5
      lookback_days: 14
      cooldown_days: 10
    extra_report:
      enabled: true
      file_path: extra_report.md
      retention: 7
      auto_cleanup:
        enabled: true
    repos: []
  gitee:
    enabled: true
    base_url: https://gitee.com/api/v5
    camouflage:
      enabled: true
      threshold: 4
      max_items: 5
      lookback_days: 14
      cooldown_days: 10
    extra_report:
      enabled: true
      file_path: extra_report.md
      retention: 7
      auto_cleanup:
        enabled: true
  gitlab:
    enabled: true
    camouflage:
      enabled: true
      threshold: 4
      max_items: 5
      lookback_days: 14
      cooldown_days: 10
    extra_report:
      enabled: true
      file_path: extra_report.md
      retention: 7
      auto_cleanup:
        enabled: true
enabled_workflows:
- wecom
scheduler:
  enabled: true
  auto_start: true
  auto_path: true
  default_time: '18:20'
  tasks:
  - time: '18:20'
    weekdays:
    - 1
    - 2
    - 3
    - 4
    - 5
log:
  level: INFO
  file_level: DEBUG
  rotation: 00:00
  retention: 7 days
  path: logs/dailybot_{time:YYYY-MM-DD}.log
admin:
  api_key: dailybot-admin
redis:
  host: 127.0.0.1
  port: 6379
  password: ''
  database: 0
