<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日报喵 DailyBot 管理面板</title>
<style>
/* ── Reset & Base ── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a1a;
  --glass-bg:rgba(255,255,255,0.04);
  --glass-border:rgba(255,255,255,0.08);
  --glass-shadow:0 8px 32px rgba(0,0,0,0.4);
  --glass-blur:blur(16px);
  --text:#e8e8f0;
  --text-dim:rgba(255,255,255,0.5);
  --accent-1:#667eea;
  --accent-2:#764ba2;
  --accent-3:#f093fb;
  --accent-4:#4facfe;
  --success:#43e97b;
  --warning:#f6d365;
  --danger:#f5576c;
  --radius:16px;
  --radius-sm:10px;
  --transition:0.35s cubic-bezier(.4,0,.2,1);
}
body{
  font-family:-apple-system,"Microsoft YaHei","PingFang SC",sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  line-height:1.6;
}

/* ── Ambient BG ── */
body::before{
  content:'';position:fixed;inset:0;z-index:-2;
  background:
    radial-gradient(ellipse 80% 60% at 10% 20%,rgba(102,126,234,0.15),transparent),
    radial-gradient(ellipse 60% 50% at 90% 80%,rgba(118,75,162,0.12),transparent),
    radial-gradient(ellipse 50% 40% at 50% 50%,rgba(240,147,251,0.06),transparent);
}
/* Animated gradient orbs */
.liquid-orb{
  position:fixed;border-radius:50%;z-index:-1;
  filter:blur(80px);opacity:0.3;
  animation:floatOrb 20s ease-in-out infinite;
}
.liquid-orb:nth-child(1){
  width:600px;height:600px;
  background:radial-gradient(circle,rgba(102,126,234,0.3),transparent);
  top:-200px;left:-200px;animation-delay:0s;
}
.liquid-orb:nth-child(2){
  width:500px;height:500px;
  background:radial-gradient(circle,rgba(240,147,251,0.25),transparent);
  bottom:-150px;right:-150px;animation-delay:-7s;
}
.liquid-orb:nth-child(3){
  width:400px;height:400px;
  background:radial-gradient(circle,rgba(79,172,254,0.2),transparent);
  top:40%;left:60%;animation-delay:-14s;
}
@keyframes floatOrb{
  0%,100%{transform:translate(0,0) scale(1)}
  25%{transform:translate(60px,-40px) scale(1.1)}
  50%{transform:translate(-30px,60px) scale(0.95)}
  75%{transform:translate(40px,30px) scale(1.05)}
}

/* ── Glass Card ── */
.glass{
  background:var(--glass-bg);
  backdrop-filter:var(--glass-blur);
  -webkit-backdrop-filter:var(--glass-blur);
  border:1px solid var(--glass-border);
  border-radius:var(--radius);
  box-shadow:var(--glass-shadow);
  transition:var(--transition);
}

/* ── Header ── */
.header{
  padding:24px 32px;
  margin-bottom:24px;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;
}
.header-left{display:flex;align-items:center;gap:16px}
.header-logo{
  width:44px;height:44px;border-radius:12px;
  background:linear-gradient(135deg,var(--accent-1),var(--accent-2));
  display:flex;align-items:center;justify-content:center;
  font-size:24px;box-shadow:0 4px 16px rgba(102,126,234,0.3);
}
.header h1{font-size:22px;font-weight:600;letter-spacing:0.5px}
.header h1 span{background:linear-gradient(135deg,var(--accent-1),var(--accent-3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-time{font-size:14px;color:var(--text-dim);font-variant-numeric:tabular-nums}
.header-key-input{
  display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,0.06);border:1px solid var(--glass-border);
  border-radius:var(--radius-sm);padding:6px 12px;
}
.header-key-input input{
  background:transparent;border:none;color:var(--text);font-size:13px;
  outline:none;width:100px;font-family:inherit;
}
.header-key-input input::placeholder{color:var(--text-dim)}
.header-key-input label{font-size:12px;color:var(--text-dim);white-space:nowrap}

/* ── Container ── */
.container{max-width:1280px;margin:0 auto;padding:0 24px 40px}

/* ── Status Cards ── */
.stats-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px;
}
.stat-card{
  padding:20px;position:relative;overflow:hidden;
  transition:var(--transition);cursor:default;
}
.stat-card:hover{transform:translateY(-2px);border-color:rgba(255,255,255,0.15)}
.stat-card .icon{font-size:28px;margin-bottom:8px}
.stat-card .label{font-size:12px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.stat-card .value{font-size:24px;font-weight:700}
.stat-card .value.small{font-size:16px;font-weight:500}
.stat-card .glow{
  position:absolute;top:-50%;right:-50%;width:100%;height:100%;
  border-radius:50%;filter:blur(40px);opacity:0.08;
  transition:var(--transition);
}
.stat-card:hover .glow{opacity:0.15;transform:scale(1.2)}

/* ── Tabs ── */
.tabs{
  display:flex;gap:4px;margin-bottom:20px;
  background:rgba(255,255,255,0.03);
  border-radius:var(--radius-sm);padding:4px;
  flex-wrap:wrap;
}
.tab-btn{
  flex:1;min-width:80px;padding:10px 20px;border:none;border-radius:8px;
  background:transparent;color:var(--text-dim);font-size:14px;font-weight:500;
  cursor:pointer;transition:var(--transition);font-family:inherit;
}
.tab-btn:hover{color:var(--text);background:rgba(255,255,255,0.05)}
.tab-btn.active{
  background:linear-gradient(135deg,rgba(102,126,234,0.25),rgba(118,75,162,0.2));
  color:#fff;box-shadow:0 2px 12px rgba(102,126,234,0.15);
}
.tab-content{display:none}
.tab-content.active{display:block}

/* ── Panels ── */
.panel{
  padding:24px;margin-bottom:20px;
  min-height:300px;
}
.panel-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;flex-wrap:wrap;gap:12px;
}
.panel-title{font-size:16px;font-weight:600}
.panel-controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap}

/* ── Form Controls ── */
.input-glass,.select-glass{
  background:rgba(255,255,255,0.06);border:1px solid var(--glass-border);
  border-radius:var(--radius-sm);padding:8px 14px;
  color:var(--text);font-size:13px;outline:none;
  transition:var(--transition);font-family:inherit;
}
.input-glass:focus,.select-glass:focus{
  border-color:var(--accent-1);box-shadow:0 0 0 3px rgba(102,126,234,0.15);
}
.select-glass option{background:#1a1a2e;color:var(--text)}

/* ── Buttons ── */
.btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:9px 20px;border:none;border-radius:var(--radius-sm);
  font-size:13px;font-weight:600;cursor:pointer;
  transition:var(--transition);font-family:inherit;white-space:nowrap;
}
.btn-primary{
  background:linear-gradient(135deg,var(--accent-1),var(--accent-2));
  color:#fff;box-shadow:0 4px 16px rgba(102,126,234,0.25);
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(102,126,234,0.35)}
.btn-primary:active{transform:translateY(0)}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.btn-ghost{
  background:rgba(255,255,255,0.06);color:var(--text);border:1px solid var(--glass-border);
}
.btn-ghost:hover{background:rgba(255,255,255,0.1)}
.btn-success{
  background:linear-gradient(135deg,#43e97b,#38f9d7);color:#0a0a1a;
  box-shadow:0 4px 16px rgba(67,233,123,0.25);
}
.btn-success:hover{box-shadow:0 6px 24px rgba(67,233,123,0.35);transform:translateY(-1px)}
.btn-danger{
  background:linear-gradient(135deg,var(--danger),#f093fb);color:#fff;
  box-shadow:0 4px 16px rgba(245,87,108,0.25);
}

/* ── Table ── */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:14px}
thead th{
  text-align:left;padding:12px 16px;
  font-size:12px;font-weight:600;color:var(--text-dim);
  text-transform:uppercase;letter-spacing:0.5px;
  border-bottom:1px solid var(--glass-border);
}
tbody td{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.04);vertical-align:top}
tbody tr{transition:var(--transition)}
tbody tr:hover{background:rgba(255,255,255,0.03)}
.tag{
  display:inline-block;padding:2px 10px;border-radius:20px;
  font-size:11px;font-weight:600;
}
.tag-success{background:rgba(67,233,123,0.15);color:var(--success)}
.tag-failed{background:rgba(245,87,108,0.15);color:var(--danger)}
.tag-warning{background:rgba(246,211,109,0.15);color:var(--warning)}
.tag-info{background:rgba(79,172,254,0.15);color:var(--accent-4)}
.tag-camo{background:rgba(240,147,251,0.15);color:var(--accent-3)}

.text-dim{color:var(--text-dim)}
.text-sm{font-size:13px}
.mono{font-family:"SF Mono","Cascadia Code",Consolas,monospace;font-size:13px}
.truncate{max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── Logs ── */
.log-list{font-family:"SF Mono","Cascadia Code",Consolas,monospace;font-size:13px}
.log-item{
  display:flex;gap:12px;padding:8px 0;
  border-bottom:1px solid rgba(255,255,255,0.04);
  align-items:flex-start;
}
.log-item:last-child{border-bottom:none}
.log-time{color:var(--text-dim);white-space:nowrap;min-width:80px;font-size:12px}
.log-status{white-space:nowrap;min-width:60px}
.log-msg{word-break:break-all}

/* ── Config Viewer ── */
.config-tree{font-size:13px;font-family:"SF Mono","Cascadia Code",Consolas,monospace}
.config-key{color:var(--accent-4)}
.config-string{color:#f6d365}
.config-number{color:#43e97b}
.config-bool{color:var(--accent-3)}
.config-null{color:var(--text-dim);font-style:italic}
.config-collapse{cursor:pointer;user-select:none}
.config-collapse:hover{opacity:0.7}
.config-hidden{display:none}
.config-toggle{cursor:pointer;font-size:10px;margin-right:4px;user-select:none;display:inline-block;width:14px;text-align:center}
.config-toggle:hover{opacity:0.7}

/* ── Toast ── */
.toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:10px}
.toast{
  padding:14px 20px;border-radius:var(--radius-sm);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  font-size:14px;font-weight:500;
  animation:slideIn 0.3s ease-out;max-width:400px;
  box-shadow:0 8px 32px rgba(0,0,0,0.3);
}
.toast-success{background:rgba(67,233,123,0.15);border:1px solid rgba(67,233,123,0.25);color:var(--success)}
.toast-error{background:rgba(245,87,108,0.15);border:1px solid rgba(245,87,108,0.25);color:var(--danger)}
.toast-info{background:rgba(79,172,254,0.15);border:1px solid rgba(79,172,254,0.25);color:var(--accent-4)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* ── Modal ── */
.modal-overlay{
  position:fixed;inset:0;z-index:9998;
  background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  animation:fadeIn 0.2s ease;
}
.modal-box{
  width:90%;max-width:640px;max-height:80vh;overflow-y:auto;
  padding:32px;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-actions{display:flex;gap:12px;margin-top:24px;justify-content:flex-end}

/* ── Trigger Toast ── */
.trigger-progress{
  margin-top:12px;padding:16px;border-radius:var(--radius-sm);
  background:rgba(255,255,255,0.03);
  display:flex;align-items:center;gap:12px;
}
.spinner{
  width:18px;height:18px;border:2px solid var(--glass-border);
  border-top-color:var(--accent-1);border-radius:50%;
  animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Empty State ── */
.empty-state{text-align:center;padding:60px 20px;color:var(--text-dim)}
.empty-state .icon{font-size:48px;margin-bottom:16px;opacity:0.4}
.empty-state p{font-size:15px}

/* ── Skeleton Loader ── */
.skeleton{background:rgba(255,255,255,0.06);border-radius:6px;animation:pulse 1.5s ease-in-out infinite}
.skeleton-line{height:16px;margin-bottom:10px;width:100%}
.skeleton-line:last-child{width:60%}
@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:0.8}}

/* ── Responsive ── */
@media(max-width:768px){
  .header{padding:16px 20px;flex-direction:column;align-items:flex-start}
  .header h1{font-size:18px}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .panel{padding:16px}
  .panel-header{flex-direction:column;align-items:flex-start}
  .container{padding:0 16px 24px}
  .log-item{flex-direction:column;gap:4px}
  .header-key-input{width:100%}
  .header-key-input input{flex:1}
}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.2)}
</style>
</head>
<body>

<!-- Liquid Orbs -->
<div class="liquid-orb"></div>
<div class="liquid-orb"></div>
<div class="liquid-orb"></div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<!-- Header -->
<header class="header glass">
  <div class="header-left">
    <div class="header-logo">🐱</div>
    <h1><span>日报喵</span> DailyBot</h1>
  </div>
  <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
    <div class="header-key-input">
      <label>🔑 Key</label>
      <input type="text" id="apiKeyInput" value="dailybot-admin" placeholder="API Key" spellcheck="false">
    </div>
    <span class="header-time" id="headerTime">--</span>
  </div>
</header>

<div class="container">

  <!-- Stats -->
  <div class="stats-grid" id="statsGrid">
    <div class="stat-card glass">
      <div class="glow" style="background:var(--accent-1)"></div>
      <div class="icon">📦</div>
      <div class="label">版本</div>
      <div class="value small" id="statVersion">--</div>
    </div>
    <div class="stat-card glass">
      <div class="glow" style="background:var(--accent-4)"></div>
      <div class="icon">⚡</div>
      <div class="label">已启用工作流</div>
      <div class="value small" id="statWorkflows">--</div>
    </div>
    <div class="stat-card glass">
      <div class="glow" style="background:var(--accent-3)"></div>
      <div class="icon">🤖</div>
      <div class="label">AI 模型</div>
      <div class="value small" id="statAiModel">--</div>
    </div>
    <div class="stat-card glass">
      <div class="glow" style="background:var(--success)"></div>
      <div class="icon">🔄</div>
      <div class="label">运行状态</div>
      <div class="value small" id="statStatus">--</div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="reports">📋 日报历史</button>
    <button class="tab-btn" data-tab="logs">📜 运行日志</button>
    <button class="tab-btn" data-tab="config">⚙️ 配置查看</button>
  </div>

  <!-- Tab: Reports -->
  <div class="tab-content active" id="tabReports">
    <div class="panel glass">
      <div class="panel-header">
        <div class="panel-title">📋 日报历史</div>
        <div class="panel-controls">
          <input type="date" class="input-glass" id="reportDate">
          <select class="select-glass" id="reportPlatform">
            <option value="">全部平台</option>
          </select>
          <button class="btn btn-ghost" onclick="loadReports()">🔄 刷新</button>
        </div>
      </div>
      <div class="table-wrap" id="reportsTableWrap">
        <div class="empty-state"><div class="icon">📋</div><p>加载中...</p></div>
      </div>
    </div>
  </div>

  <!-- Tab: Logs -->
  <div class="tab-content" id="tabLogs">
    <div class="panel glass">
      <div class="panel-header">
        <div class="panel-title">📜 运行日志</div>
        <div class="panel-controls">
          <button class="btn btn-ghost" onclick="loadLogs()">🔄 刷新</button>
        </div>
      </div>
      <div id="logsContent">
        <div class="empty-state"><div class="icon">📜</div><p>加载中...</p></div>
      </div>
    </div>
  </div>

  <!-- Tab: Config -->
  <div class="tab-content" id="tabConfig">
    <div class="panel glass">
      <div class="panel-header">
        <div class="panel-title">⚙️ 配置查看 <span class="text-sm text-dim">(敏感信息已脱敏)</span></div>
        <div class="panel-controls">
          <button class="btn btn-ghost" onclick="loadConfig()">🔄 刷新</button>
        </div>
      </div>
      <div id="configContent">
        <div class="empty-state"><div class="icon">⚙️</div><p>加载中...</p></div>
      </div>
    </div>
  </div>

  <!-- Trigger Button -->
  <div class="glass" style="padding:20px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
    <div>
      <div style="font-weight:600;margin-bottom:4px">🚀 手动触发日报</div>
      <div class="text-dim text-sm">立即执行采集 → AI 总结 → 推送完整流程</div>
    </div>
    <button class="btn btn-success" id="triggerBtn" onclick="triggerReport()">
      ▶ 立即执行
    </button>
  </div>
</div>

<script>
// ── Config ──
const BASE = '';
const LS_KEY = 'dailybot_api_key';

// ── State ──
let state = { key: '', refreshing: false };

// ── Init ──
document.addEventListener('DOMContentLoaded', () => {
  // Restore key
  const saved = localStorage.getItem(LS_KEY);
  if (saved) document.getElementById('apiKeyInput').value = saved;
  state.key = document.getElementById('apiKeyInput').value;
  document.getElementById('reportDate').value = new Date().toISOString().slice(0,10);

  // Tab switching
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab' + btn.dataset.tab.charAt(0).toUpperCase() + btn.dataset.tab.slice(1)).classList.add('active');
    });
  });

  // API key auto-save
  document.getElementById('apiKeyInput').addEventListener('input', e => {
    state.key = e.target.value;
    localStorage.setItem(LS_KEY, state.key);
  });

  // Clock
  function updateClock() {
    const now = new Date();
    document.getElementById('headerTime').textContent = now.toLocaleString('zh-CN', { hour12: false });
  }
  updateClock();
  setInterval(updateClock, 1000);

  // Load all
  loadAll();
});

// ── API Helper ──
async function api(path, opts = {}) {
  const url = BASE + path + (path.includes('?') ? '&' : '?') + 'key=' + encodeURIComponent(state.key);
  const res = await fetch(url, { ...opts, headers: { 'Accept': 'application/json', ...opts.headers } });
  if (res.status === 401) throw new Error('API Key 无效，请在右上角输入正确的 Key');
  if (!res.ok) throw new Error(`请求失败 (${res.status})`);
  return res.json();
}

// ── Load All ──
async function loadAll() {
  await Promise.all([loadStatus(), loadReports(), loadLogs(), loadConfig()]);
}

// ── Status ──
async function loadStatus() {
  try {
    const data = await api('/admin/status');
    document.getElementById('statVersion').textContent = data.version || '--';
    document.getElementById('statWorkflows').textContent = (data.enabled_workflows || []).join(', ') || '未配置';
    const models = (data.platforms || []).map(p => p.ai_model).filter(Boolean);
    document.getElementById('statAiModel').textContent = [...new Set(models)].join(', ') || '未配置';
    const statusText = data.platforms && data.platforms.length > 0 ? '✅ 运行中' : '⚠️ 待配置';
    document.getElementById('statStatus').textContent = statusText;

    // Populate platform filter
    const sel = document.getElementById('reportPlatform');
    const currentVal = sel.value;
    sel.innerHTML = '<option value="">全部平台</option>';
    (data.enabled_workflows || []).forEach(wf => {
      sel.innerHTML += `<option value="${wf}">${wf}</option>`;
    });
    sel.value = currentVal;
  } catch (e) {
    showToast(e.message, 'error');
  }
}

// ── Reports ──
async function loadReports() {
  const wrap = document.getElementById('reportsTableWrap');
  wrap.innerHTML = '<div class="skeleton" style="padding:20px"><div class="skeleton-line"></div><div class="skeleton-line"></div><div class="skeleton-line"></div></div>';
  try {
    const date = document.getElementById('reportDate').value;
    const platform = document.getElementById('reportPlatform').value;
    let url = '/admin/reports?limit=50';
    if (date) url += '&date=' + date;
    if (platform) url += '&platform=' + platform;
    const data = await api(url);
    const reports = data.reports || [];

    if (reports.length === 0) {
      wrap.innerHTML = '<div class="empty-state"><div class="icon">📋</div><p>暂无日报记录</p></div>';
      return;
    }

    let html = '<table><thead><tr><th>时间</th><th>平台</th><th>摘要</th><th>类型</th></tr></thead><tbody>';
    reports.forEach(r => {
      const time = (r.created_at || '').slice(0, 19).replace('T', ' ');
      const isCamo = r.is_camouflage == 1;
      const summary = (r.summary || '').length > 120 ? (r.summary || '').slice(0, 120) + '…' : (r.summary || '');
      html += `<tr>
        <td class="text-dim text-sm mono">${time}</td>
        <td><span class="tag tag-info">${escHtml(r.platform || '')}</span></td>
        <td class="text-sm">${escHtml(summary)}</td>
        <td>${isCamo ? '<span class="tag tag-camo">伪装</span>' : '<span class="tag tag-success">正常</span>'}</td>
      </tr>`;
    });
    html += '</tbody></table>';
    if (data.count !== undefined) html += `<div class="text-dim text-sm" style="margin-top:12px">共 ${data.count} 条记录</div>`;
    wrap.innerHTML = html;
  } catch (e) {
    wrap.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>${escHtml(e.message)}</p></div>`;
  }
}

// ── Logs ──
async function loadLogs() {
  const wrap = document.getElementById('logsContent');
  wrap.innerHTML = '<div class="skeleton" style="padding:20px"><div class="skeleton-line"></div><div class="skeleton-line"></div><div class="skeleton-line"></div></div>';
  try {
    const data = await api('/admin/logs?limit=100');
    const logs = data.logs || [];

    if (logs.length === 0) {
      wrap.innerHTML = '<div class="empty-state"><div class="icon">📜</div><p>暂无运行日志</p></div>';
      return;
    }

    let html = '<div class="log-list">';
    logs.forEach(l => {
      const time = (l.created_at || '').slice(0, 19).replace('T', ' ');
      let statusTag = '<span class="tag tag-info">' + escHtml(l.status || '') + '</span>';
      if (l.status === 'success') statusTag = '<span class="tag tag-success">✅ 成功</span>';
      else if (l.status === 'failed') statusTag = '<span class="tag tag-failed">❌ 失败</span>';
      else if (l.status === 'no_data') statusTag = '<span class="tag tag-warning">📭 无数据</span>';
      html += `<div class="log-item">
        <span class="log-time">${time}</span>
        <span class="log-status">${statusTag}</span>
        <span class="log-msg">${l.platform ? escHtml('[' + l.platform + '] ') : ''}${escHtml(l.message || '')}</span>
      </div>`;
    });
    html += '</div>';
    wrap.innerHTML = html;
  } catch (e) {
    wrap.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>${escHtml(e.message)}</p></div>`;
  }
}

// ── Config ──
async function loadConfig() {
  const wrap = document.getElementById('configContent');
  wrap.innerHTML = '<div class="skeleton" style="padding:20px"><div class="skeleton-line"></div><div class="skeleton-line"></div><div class="skeleton-line"></div></div>';
  try {
    const data = await api('/admin/config?masked=true');
    const html = renderConfigTree(data);
    wrap.innerHTML = html;
  } catch (e) {
    wrap.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>${escHtml(e.message)}</p></div>`;
  }
}

function renderConfigTree(obj, depth = 0) {
  if (obj === null || obj === undefined) return '<span class="config-null">null</span>';
  if (typeof obj === 'string') return '<span class="config-string">"' + escHtml(obj) + '"</span>';
  if (typeof obj === 'number') return '<span class="config-number">' + obj + '</span>';
  if (typeof obj === 'boolean') return '<span class="config-bool">' + obj + '</span>';
  if (Array.isArray(obj)) {
    if (obj.length === 0) return '<span class="config-null">[]</span>';
    let items = obj.map((item, i) => {
      const isComplex = typeof item === 'object' && item !== null;
      const toggle = isComplex ? ' <span class="config-toggle" onclick="toggleConfigCollapse(this)">▼</span>' : '';
      return '<div style="padding-left:20px;border-left:1px solid rgba(255,255,255,0.06);margin:2px 0">' +
        toggle + '<span class="config-key">[' + i + ']</span>: ' +
        renderConfigTree(item, depth + 1) + '</div>';
    }).join('');
    return '<div class="config-collapse-wrap">' + items + '</div>';
  }
  if (typeof obj === 'object') {
    const keys = Object.keys(obj);
    if (keys.length === 0) return '<span class="config-null">{}</span>';
    let items = keys.map(k => {
      const v = obj[k];
      const isComplex = typeof v === 'object' && v !== null;
      const toggle = isComplex ? ' <span class="config-toggle" onclick="toggleConfigCollapse(this)">▼</span>' : '';
      return '<div style="padding-left:20px;border-left:1px solid rgba(255,255,255,0.06);margin:2px 0">' +
        toggle + '<span class="config-key">' + escHtml(k) + '</span>: ' +
        renderConfigTree(v, depth + 1) + '</div>';
    }).join('');
    return '<div class="config-collapse-wrap">' + items + '</div>';
  }
  return String(obj);
}

function toggleConfigCollapse(el) {
  const wrap = el.parentElement.querySelector('.config-collapse-wrap');
  if (!wrap) return;
  const isHidden = wrap.style.display === 'none';
  wrap.style.display = isHidden ? '' : 'none';
  el.textContent = isHidden ? '▼' : '▶';
}

// ── Trigger Report ──
async function triggerReport() {
  const btn = document.getElementById('triggerBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 执行中...';

  showToast('🚀 日报生成任务已提交，正在执行...', 'info');

  try {
    const data = await api('/admin/trigger', { method: 'POST' });
    showToast('✅ ' + (data.message || '日报生成完成！'), 'success');
    // Refresh data
    setTimeout(() => { loadAll(); }, 1000);
  } catch (e) {
    showToast('❌ ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '▶ 立即执行';
  }
}

// ── Toast ──
function showToast(message, type = 'info') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast toast-' + type;
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transform = 'translateX(100%)';
    toast.style.transition = '0.3s ease';
    setTimeout(() => toast.remove(), 300);
  }, 4000);
}

// ── Utils ──
function escHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
